<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracking</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="container">
    <header class="top">
      <div>
        <h1 class="m0">Tracking</h1>
        <p id="sessionLine" class="small m0"></p>
      </div>
      <div class="row">
        <nav class="nav">
          <a data-page="dashboard" href="dashboard.html">Dashboard</a>
          <a id="navUsers" data-page="users" href="users.html">Users</a>
          <a data-page="claims" href="claims.html">Claims</a>
          <a id="navReviews" data-page="reviews" href="reviews.html">Reviews</a>
          <a data-page="tracking" href="tracking.html">Tracking</a>
        </nav>
        <button id="logoutBtn" class="btn">Logout</button>
      </div>
    </header>

    <p id="msg" class="msg"></p>

    <section class="card">
      <div class="row">
        <input id="searchId" type="number" min="1" placeholder="Claim ID" />
        <button id="searchBtn" class="btn btn-primary" type="button">Search</button>
      </div>
      <div id="result"></div>
    </section>

    <section id="resubmitCard" class="card hidden">
      <h3>Resubmit rejected claim</h3>
      <form id="resubmitForm">
        <input id="resubmitId" type="hidden" />
        <label>Amount<input id="resubmitAmount" type="number" min="1" step="0.01" required /></label>
        <label>Description<textarea id="resubmitDescription" rows="4" required></textarea></label>
        <button class="btn btn-primary" type="submit">Resubmit</button>
      </form>
    </section>
  </main>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/tracking.js"></script>
</body>
</html>

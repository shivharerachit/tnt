<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Product Inventory Dashboard</h1>
    </header>

    <section class="controls">

        <input type="text" id="searchInput" placeholder="Search by product name..." />

        <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
            <option value="accessories">Accessories</option>
        </select>

        <label>
            <input type="checkbox" id="lowStockFilter" />
            Show Low Stock (less than 5)
        </label>

        <select id="sortSelect">
            <option value="default">Sort By</option>
            <option value="priceLow">Price: Low to High</option>
            <option value="priceHigh">Price: High to Low</option>
            <option value="nameAZ">Name: A to Z</option>
            <option value="nameZA">Name: Z to A</option>
        </select>

    </section>

    <section class="analytics">
        <div class="analytics-card">
            <h3>Total Products</h3>
            <p id="totalProducts">0</p>
        </div>
        <div class="analytics-card">
            <h3>Total Inventory Value</h3>
            <p id="totalValue">₹0</p>
        </div>
        <div class="analytics-card">
            <h3>Out of Stock</h3>
            <p id="outOfStock">0</p>
        </div>
    </section>

    <p id="loadingMsg">Loading products...</p>
    <div id="productGrid" class="product-grid"></div>

    <section class="add-product-form">
        <h2>Add New Product</h2>

        <label for="productName">Product Name</label>
        <input type="text" id="productName" placeholder="e.g. Headphones" />

        <label for="productPrice">Price (₹)</label>
        <input type="number" id="productPrice" placeholder="e.g. 1500" />

        <label for="productStock">Stock Quantity</label>
        <input type="number" id="productStock" placeholder="e.g. 10" />

        <label for="productCategory">Category</label>
        <select id="productCategory">
            <option value="">-- Select Category --</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
            <option value="accessories">Accessories</option>
        </select>

        <button id="addProductBtn">Add Product</button>
        <p id="formError" style="color: red;"></p>
    </section>

    <script src="script.js"></script>
</body>

</html>

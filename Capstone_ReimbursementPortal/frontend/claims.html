<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claims</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="container">
    <header class="top">
      <div>
        <h1 class="m0">Claims</h1>
        <p id="sessionLine" class="small m0"></p>
      </div>
      <div class="row">
        <nav class="nav">
          <a data-page="dashboard" href="dashboard.html">Dashboard</a>
          <a id="navUsers" data-page="users" href="users.html">Users</a>
          <a data-page="claims" href="claims.html">Claims</a>
          <a id="navReviews" data-page="reviews" href="reviews.html">Reviews</a>
          <a data-page="tracking" href="tracking.html">Tracking</a>
        </nav>
        <button id="logoutBtn" class="btn">Logout</button>
      </div>
    </header>

    <p id="msg" class="msg"></p>

    <section id="submitCard" class="card">
      <h3>Submit claim</h3>
      <p id="employeeLine" class="small"></p>
      <form id="claimForm">
        <label>Amount<input id="amount" type="number" min="1" step="0.01" required /></label>
        <label>Description<textarea id="description" rows="4" required></textarea></label>
        <button class="btn btn-primary" type="submit">Submit claim</button>
      </form>
    </section>

    <section class="card">
      <div class="row">
        <label>Page size
          <select id="size">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
          </select>
        </label>
        <button id="prev" class="btn" type="button">Previous</button>
        <button id="next" class="btn" type="button">Next</button>
        <span id="pageInfo" class="small"></span>
      </div>
      <table>
        <thead><tr><th>ID</th><th>Employee</th><th>Amount</th><th>Status</th><th>Reviewer</th><th>Comments</th></tr></thead>
        <tbody id="claimsBody"></tbody>
      </table>
    </section>
  </main>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/claims.js"></script>
</body>
</html>
